server:
  port: 8081

spring:
  application:
    name: securebank-api

  datasource:
    url: jdbc:mysql://localhost:3307/securebank
    username: root
    password: adminadmin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/securebank