services:

  mysql:
    image: mysql:8.0
    container_name: securebank-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: securebank123
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: securebank
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecurebank123"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: securebank-keycloak
    restart: always
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: securebank123
    ports:
      - "8181:8080"
    command: start-dev
    depends_on:
      mysql:
        condition: service_healthy   # ← waits for MySQL to be ready

volumes:
  mysql_data: